<!DOCTYPE html>
<html>
<head>
	<title>實用計算機</title>
	<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
	<style>
		body {
		background-color: black;
		text-align: center;
		padding: 100px;

		}

		#app {
			width: 300px;
			height: 400px;
			/*可使margin自動抓一半，但需要有設定此元件大小*/
			margin: auto;
		}

		p {
			color: #fff;
			text-align: right;
			font-size: 40px;
			
			height: 60px;
			padding: 5px;
			margin: 5px;
		}

		button {
			/* 一顆按鈕：寬70px + 邊寬5px = 75px */
			/* 一排按鈕：75px * 4 = 300px */
			width: 70px;
			height: 70px;

			border-width: 5px;
			border-radius: 50%;
			border-color: black;

			color: #fff;
			font-size: 20px;

			/* 去除點擊時外圍的藍色框框，與border不同處於outline，border並不佔空間 */
			/* outline: none; */
		}

		.bg-orange {
			background-color: orange;
		}
		.bg-light {
			background-color: #777;
		}
		.bg-gray {
			background-color: #333;
		}

		/* 以上為預設程式碼 */
		button:active{
			transform: scale(0.5,0.5);
		}
		.bg-orange:active{
			background-color: #00c3ff;
		}
		.bg-gray:active{
			background-color: #001aff;
		}
		.bg-light:active{
			background-color: #00ff95;
		}
	</style>
</head>
<body>
    
    <div id="app">
        <p></p>
        <button class="bg-light">C</button>
        <button class="bg-light">(</button>
        <button class="bg-light">)</button>
        <button class="bg-orange">/</button>
        <button class="bg-gray">7</button>
        <button class="bg-gray">8</button>
        <button class="bg-gray">9</button>
        <button class="bg-orange">*</button>
        <button class="bg-gray">4</button>
        <button class="bg-gray">5</button>
        <button class="bg-gray">6</button>
        <button class="bg-orange">-</button>
        <button class="bg-gray">1</button>
        <button class="bg-gray">2</button>
        <button class="bg-gray">3</button>
        <button class="bg-orange">+</button>
        <button class="bg-gray">del</button>
        <button class="bg-gray">0</button>
        <button class="bg-gray">.</button>
        <button class="bg-gray">=</button>
    </div>
    <script>
		$("button").click(getcher);
		function getcher(){
			var char = $(this).text();
			var screen_text = $("p").text();  
			 console.log(char);
			// while(cher == true){
			if (char == "C") {
				screen_text = " ";
			}else if(char == "del"){
				screen_text = screen_text.slice(0, screen_text.length - 1);
			}else if (char == "="){
				screen_text = eval(screen_text);
			}
			else {
				screen_text += char;
			}
			$("p").text(screen_text);
			// }
		}
	</script>
</body>
</html>
